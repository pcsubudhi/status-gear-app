<!-- React + Babel (CDN — works on any server, no npm needed) -->
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ══════════════════════════════════════════════════
// API LAYER — switches between demo data and real server
// ══════════════════════════════════════════════════
const API = {
  token: localStorage.getItem("sg_token") || null,
  base: window.SG_CONFIG.API_BASE,
  demo: false,

  async call(method, path, body = null) {
    if (this.demo) return this._demoResponse(method, path, body);
    try {
      const opts = {
        method,
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json",
          ...(this.token ? { "Authorization": `Bearer ${this.token}` } : {})
        },
        ...(body ? { body: JSON.stringify(body) } : {})
      };
      const res = await fetch(`${this.base}${path}`, opts);
      if (res.status === 401 && path !== "/login") {
        // Token expired — clear session, force re-login
        this.token = null;
        localStorage.removeItem("sg_token");
        localStorage.removeItem("sg_user");
        window.location.reload();
        throw new Error("Session expired");
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Server error");
      return data;
    } catch (e) {
      console.error("API error:", e);
      throw e;
    }
  },

  async login(email, password) {
    const data = await this.call("POST", "/login", { email, password });
    if (data.success) {
      this.token = data.token;
      localStorage.setItem("sg_token", data.token);
    }
    return data;
  },

  logout() {
    this.call("POST", "/logout").catch(() => {});
    this.token = null;
    localStorage.removeItem("sg_token");
    localStorage.removeItem("sg_user");
  },

  // ── Demo responses (same shape as real API) ──
  _demoResponse(method, path, body) {
    return new Promise(resolve => setTimeout(() => {
      if (path === "/login") {
        const u = DEMO_USERS.find(u => u.email === body?.email);
        if (u && body?.password === "demo") {
          this.token = "demo-token";
          resolve({ success: true, token: "demo-token", user: u });
        } else {
          resolve({ success: false, message: "Use any email from list, password: demo" });
        }
        return;
      }
      if (path === "/me")       return resolve(DEMO_USERS[0]);
      if (path === "/users")    return resolve({ success: true, data: DEMO_USERS });
      if (path === "/tickets")  return resolve({ success: true, data: DEMO_TICKETS });
      if (path === "/todos")    return resolve({ success: true, data: DEMO_TODOS });
      if (path === "/reminders")return resolve({ success: true, data: DEMO_REMINDERS });
      resolve({ success: true, data: [] });
    }, 250));
  }
};

// ══════════════════════════════════════════════════
// SOUND ENGINE
// ══════════════════════════════════════════════════
const Sound = {
  ctx: null,
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === "suspended") this.ctx.resume();
  },
  play(type = "notify") {
    try {
      this.init();
      const c = this.ctx;
      const notes = {
        notify:   [[520,0,.1],[660,.12,.1],[784,.24,.18]],
        urgent:   [[880,0,.06],[880,.1,.06],[880,.2,.06],[1100,.32,.22]],
        message:  [[1046,.0,.07],[1318,.09,.11]],
        resolve:  [[392,.0,.07],[523,.09,.07],[659,.18,.07],[784,.27,.22]],
        reject:   [[784,.0,.1],[523,.12,.1],[392,.24,.2]],
        reminder: [[440,.0,.1],[554,.12,.1],[659,.24,.1],[554,.36,.1],[440,.48,.16]],
        submit:   [[523,.0,.08],[659,.1,.08],[784,.2,.14]],
        approve:  [[523,.0,.07],[659,.09,.07],[784,.18,.07],[1047,.28,.2]],
      };
      (notes[type]||notes.notify).forEach(([f,t,d])=>{
        const o=c.createOscillator(), g=c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value=f; o.type="sine";
        g.gain.setValueAtTime(0,c.currentTime+t);
        g.gain.linearRampToValueAtTime(.16,c.currentTime+t+.01);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+d);
        o.start(c.currentTime+t); o.stop(c.currentTime+t+d+.05);
      });
    } catch(e){}
  }
};

const PLUS1  = new Date(Date.now()+86400000).toISOString().split("T")[0];

// UTILS

const fmtDate  = d => d ? new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtDT    = d => d ? new Date(d).toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—";
const fmtTime  = t => { if(!t) return ""; const [h,m]=t.split(":"); const hr=parseInt(h); return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?"PM":"AM"}`; };
const getName  = (ids, users) => String(ids||"").split(",").filter(Boolean).map(i=>users.find(u=>u.id==i.trim())?.name||`#${i}`).join(", ");
const initials = n => (n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const aColor   = id => ["#E11D48","#D97706","#059669","#2563EB","#7C3AED","#DB2777","#0891B2","#16A34A"][Number(id)%8];
const daysUntil= d => { if(!d||d==="0000-00-00"||d==="null") return null; const dt=new Date(d); if(isNaN(dt.getTime())) return null; const td=new Date(TODAY); td.setHours(0,0,0,0); dt.setHours(0,0,0,0); return Math.ceil((dt-td)/(1000*60*60*24)); };
const isOverdue= d => daysUntil(d) !== null && daysUntil(d) < 0;
const isDueToday=d => daysUntil(d) === 0;

    calendar:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    filter:  <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,

    differ:  <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01"/></>,

    logout:  <><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,

  return <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{g[n]||<circle cx="12" cy="12" r="4"/>}</svg>;
};

// ══════════════════════════════════════════════════
// UI ATOMS
// ══════════════════════════════════════════════════
const Av = ({name,id,size=32}) => (
  <div style={{width:size,height:size,borderRadius:"50%",background:aColor(id||0),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:size*.34,fontWeight:800,flexShrink:0,letterSpacing:-.5}}>

const Chip = ({label,bg,tx,size=10}) => (
  <span style={{background:bg,color:tx,padding:"2px 9px",borderRadius:20,fontSize:size,fontWeight:800,letterSpacing:.3,whiteSpace:"nowrap"}}>{label}</span>
);

const StatusChip = ({status}) => {
  const s=STATUSES[status]||{bg:"#F1F5F9",tx:"#64748B",dot:"#94A3B8"};
  return <span style={{background:s.bg,color:s.tx,padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:800,letterSpacing:.3,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",gap:4}}>
    <span style={{width:6,height:6,borderRadius:"50%",background:s.dot,flexShrink:0}}/>{status}
  </span>;
};

const TypeIcon = ({type}) => ({COMPLAINT:"🚨",REQUEST:"📋",ADVICE:"💡",REPORT:"📊"})[type]||"📄";

const DuePill = ({date}) => {
  const d=daysUntil(date);
  if(d===null) return null;
  if(d<0)  return <Chip label={`${Math.abs(d)}d overdue`} bg="#FEE2E2" tx="#DC2626"/>;
  if(d===0) return <Chip label="Due Today!" bg="#FEF3C7" tx="#D97706"/>;
  if(d<=2) return <Chip label={`${d}d left`} bg="#FFF7ED" tx="#EA580C"/>;
  return <Chip label={`${d}d left`} bg="#F0FDF4" tx="#16A34A"/>;
};

const iLbl = {display:"block",fontSize:10,fontWeight:800,color:"#64748B",marginBottom:5,letterSpacing:.8,textTransform:"uppercase"};
const iSt  = {width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:13,color:"#0F172A",background:"#F8FAFC",outline:"none",boxSizing:"border-box",fontFamily:"inherit"};

// ══════════════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════════════
const LoginScreen = ({onLogin}) => {
  const saved = JSON.parse(localStorage.getItem("sg_remember")||"null");
  const [email,setEmail] = useState(saved?.email||"");
  const [pass,setPass]   = useState(saved?.pass||"");
  const [err,setErr]     = useState("");
  const [loading,setLoading] = useState(false);
  const [showPass,setShowPass] = useState(false);
  const [remember,setRemember] = useState(!!saved);
  const [suggestions,setSuggestions] = useState([]);
  const [showSugg,setShowSugg] = useState(false);
  const [allUsers,setAllUsers] = useState([]);

  // Fetch user list for autocomplete
  useEffect(()=>{
    fetch(API.base+"/users-public").then(r=>r.json()).then(d=>{
      if(d.data) setAllUsers(d.data);
    }).catch(()=>{
      // Fallback: try to load from cached list
    });
  },[]);

  const onUsernameChange = (val) => {
    setEmail(val);
    if(val.length >= 2 && allUsers.length > 0) {
      const q = val.toLowerCase();
      const matches = allUsers.filter(u =>
        u.name?.toLowerCase().includes(q) ||
        u.username?.toLowerCase().includes(q) ||
        u.email?.toLowerCase().includes(q)
      ).slice(0, 5);
      setSuggestions(matches);
      setShowSugg(matches.length > 0);
    } else {
      setShowSugg(false);
    }
  };

  const selectUser = (u) => {
    setEmail(u.username || u.email);
    setShowSugg(false);
  };

  const submit = async () => {
    if(!email||!pass) return setErr("Enter username and password");
    setLoading(true); setErr("");
    try {
      const data = await API.login(email, pass);
      if(data.success) {
        localStorage.setItem("sg_user", JSON.stringify(data.user));
        if(remember) {
          localStorage.setItem("sg_remember", JSON.stringify({email, pass}));
        } else {
          localStorage.removeItem("sg_remember");
        }
        onLogin(data.user);
      } else {
        setErr(data.message || "Invalid credentials");
      }
    } catch(e) {
      setErr("Cannot connect to server. Check internet connection.");
    }
    setLoading(false);
  };

  // Auto-login if remember me was set
  useEffect(()=>{
    if(saved?.email && saved?.pass) {
      setLoading(true);
      API.login(saved.email, saved.pass).then(data=>{
        if(data.success) {
          localStorage.setItem("sg_user", JSON.stringify(data.user));
          onLogin(data.user);
        } else {
          setLoading(false);
          localStorage.removeItem("sg_remember");
        }
      }).catch(()=>setLoading(false));
    }
  },[]);

  if(loading && saved) return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:72,height:72,borderRadius:22,background:"linear-gradient(135deg,#E8690A,#DC2626)",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <Ic n="ticket" s={34} c="#fff"/>
      </div>
      <h1 style={{margin:"0 0 4px",fontSize:26,fontWeight:900,color:"#fff"}}>Status Gear</h1>
      <p style={{margin:"16px 0 0",fontSize:13,color:"#64748B"}}>Signing in…</p>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{width:72,height:72,borderRadius:22,background:"linear-gradient(135deg,#E8690A,#DC2626)",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ic n="ticket" s={34} c="#fff"/>
          </div>
          <h1 style={{margin:"0 0 4px",fontSize:26,fontWeight:900,color:"#fff"}}>Status Gear</h1>
          <p style={{margin:0,fontSize:13,color:"#64748B"}}>Construction Management App</p>
        </div>

        <div style={{background:"#1E293B",borderRadius:20,padding:24}}>
          {API.demo && (
            <div style={{background:"#0F3460",borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:11,color:"#38BDF8",lineHeight:1.6}}>
              🎯 <strong>Demo Mode ON</strong><br/>
              Email: admin@steplit.com &nbsp;·&nbsp; Password: demo
            </div>
          )}
          <div style={{marginBottom:14,position:"relative"}}>
            <label style={{...iLbl,color:"#94A3B8"}}>USERNAME / EMAIL</label>
            <input type="text" value={email} onChange={e=>onUsernameChange(e.target.value)}
              onFocus={()=>email.length>=2 && suggestions.length>0 && setShowSugg(true)}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="Enter username or email"
              autoComplete="off"
              style={{...iSt,background:"#0F172A",borderColor:"#334155",color:"#fff"}}/>
            {/* Autocomplete dropdown */}
            {showSugg && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1E293B",border:"1px solid #334155",borderRadius:10,marginTop:4,zIndex:100,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.4)"}}>
                {suggestions.map(u=>(
                  <div key={u.id} onClick={()=>selectUser(u)} style={{padding:"10px 14px",borderBottom:"1px solid #334155",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                    <Av name={u.name} id={u.id} size={28}/>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{u.name}</div>
                      <div style={{fontSize:10,color:"#64748B"}}>{u.username} · {u.usertype}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{marginBottom:14}}>
            <label style={{...iLbl,color:"#94A3B8"}}>PASSWORD</label>
            <div style={{position:"relative"}}>
            <input type={showPass?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="••••••••"
              style={{...iSt,background:"#0F172A",borderColor:"#334155",color:"#fff",paddingRight:44}}/>
            <button onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94A3B8",fontSize:16,padding:4}}>
              {showPass ? "🙈" : "👁️"}
            </button>
            </div>
          </div>
          {/* Remember Me */}
          <div onClick={()=>setRemember(!remember)} style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:6,border:remember?"none":"1.5px solid #475569",background:remember?"#3B82F6":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {remember && <span style={{color:"#fff",fontSize:13,fontWeight:900}}>✓</span>}
            </div>
            <span style={{fontSize:12,color:"#94A3B8"}}>Remember me</span>
          </div>
          {err && <p style={{margin:"0 0 12px",fontSize:12,color:"#F87171",textAlign:"center"}}>{err}</p>}
          <button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#334155":"linear-gradient(135deg,#E8690A,#DC2626)",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:14,fontWeight:900,cursor:loading?"not-allowed":"pointer"}}>
            {loading ? "Signing in…" : "Sign In →"}
          </button>
        </div>

        <p style={{textAlign:"center",marginTop:20,fontSize:11,color:"#475569"}}>
          soft.steplit.com · Status Gear 1.0V
        </p>
      </div>
    </div>
  );
};

          <Ic n="alarm" s={32} c="#D97706"/>

        <p style={{margin:"0 0 6px",fontSize:10,fontWeight:800,color:"#94A3B8",letterSpacing:1.2}}>⏰ REMINDER</p>

        <div style={{display:"flex",gap:10}}>
          <button onClick={onSnooze} style={{flex:1,background:"#F1F5F9",color:"#475569",border:"none",borderRadius:12,padding:"12px",fontWeight:800,fontSize:13,cursor:"pointer"}}>

};

        display:"flex",alignItems:"center",gap:t.persistent?12:10,

        boxShadow:t.persistent?"0 10px 40px rgba(0,0,0,.4)":"0 8px 24px rgba(0,0,0,.25)",

);

// TICKET CHAT
// ══════════════════════════════════════════════════
const TicketChat = ({ticket,users,currentUser,onBack,onStatusChange,isAdmin,addToast}) => {
  const [msg,setMsg]   = useState("");
  const [logs,setLogs] = useState(ticket.logs||[]);
  const [showDiffer,setShowDiffer]       = useState(false);
  const [showApprove,setShowApprove]     = useState(false);
  const [differDate,setDifferDate]       = useState("");
  const [differRemark,setDifferRemark]   = useState("");
  const [approveDate,setApproveDate]     = useState("");
  const [approveRemark,setApproveRemark] = useState("");
  const chatEnd = useRef(null);
  const inp = useRef(null);

  useEffect(()=>{ chatEnd.current?.scrollIntoView({behavior:"smooth"}); },[logs]);

  const send = async () => {
    if(!msg.trim()) return;
    const l={id:Date.now(),writerid:currentUser.id,writer_name:currentUser.name,message:msg.trim(),created_at:new Date().toISOString()};
    setLogs(p=>[...p,l]); setMsg(""); Sound.play("message");
    {
      try { await API.call("POST",`/tickets/${ticket.id}/log`,{message:msg.trim()}); } catch(e){}
    }
    inp.current?.focus();
  };

  const doStatus = (status, logMsg, extra={}) => {
    onStatusChange(ticket.id,status,extra);
    setLogs(p=>[...p,{id:Date.now(),writerid:currentUser.id,writer_name:currentUser.name,message:`🔄 Status → ${status}${logMsg?` — ${logMsg}`:""}`,created_at:new Date().toISOString(),system:true}]);
    Sound.play(status==="RESOLVED"?"resolve":status==="NOT RESOLVED"?"reject":"notify");
    addToast(status==="RESOLVED"?"✅":"🔄","Ticket "+status,`#${ticket.id}`);
  };

  const isAssigned = String(ticket.touserid||"").split(",").map(s=>s.trim()).includes(String(currentUser.id));
  const canAct = !["\RESOLVED","NOT RESOLVED"].includes(ticket.status);

  return (
    <div className="sg-chat-container" style={{display:"flex",flexDirection:"column",height:"100%",background:"#F8FAFC",position:"fixed",inset:0,maxWidth:480,margin:"0 auto",zIndex:500}}>
      {/* Header */}
      <div style={{background:"#fff",padding:"12px 14px",borderBottom:"1px solid #F1F5F9",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{background:"#F1F5F9",border:"none",borderRadius:50,padding:7,cursor:"pointer",display:"flex"}}><Ic n="back" s={17} c="#475569"/></button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:16}}><TypeIcon type={ticket.type}/></span>
              <span style={{fontSize:11,fontWeight:800,color:"#475569"}}>{ticket.type}</span>
              <span style={{fontSize:10,color:"#94A3B8"}}>#{ticket.id}</span>
              <StatusChip status={ticket.status}/>
              <DuePill date={ticket.lastdate}/>
            </div>
            <p style={{margin:"3px 0 0",fontSize:11,color:"#64748B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(ticket.description||"").slice(0,55)}</p>
          </div>
        </div>
        {/* Action buttons */}
        <div style={{marginTop:10,display:"flex",gap:7,flexWrap:"wrap"}}>
          {canAct && isAssigned && <Btn sm label="✓ Resolve"     color="#15803D" bg="#22C55E" onClick={()=>doStatus("RESOLVED","Resolved.")}/>}
          {canAct && isAssigned && <Btn sm label="Processing"    color="#C2410C" bg="#F97316" onClick={()=>doStatus("PROCESSING","Processing.")}/>}
          {canAct && isAssigned && <Btn sm label="✗ Not Resolved" color="#9D174D" bg="#EC4899" onClick={()=>doStatus("NOT RESOLVED","Not resolved.")}/>}
          {!isAdmin && canAct   && <Btn sm outline label="📅 Date Differ" color="#B45309" onClick={()=>setShowDiffer(true)}/>}
          {isAdmin && ticket.status==="REQ DIFFER DATE" && <Btn sm label="📅 Review Date" color="#1D4ED8" bg="#3B82F6" onClick={()=>setShowApprove(true)}/>}
          {ticket.status==="RESOLVED REQUEST" && isAdmin && <Btn sm label="Confirm Resolve" color="#15803D" bg="#22C55E" onClick={()=>doStatus("RESOLVED","Confirmed.")}/>}
        </div>
      </div>

      {/* Ticket summary card */}
      <div style={{margin:"10px 12px 0",background:"#fff",borderRadius:14,padding:"12px 14px",borderLeft:`4px solid ${STATUSES[ticket.status]?.dot||"#94A3B8"}`,flexShrink:0}}>
        <p style={{margin:"0 0 8px",fontSize:13,color:"#1E293B",lineHeight:1.5}}>{ticket.description}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px",fontSize:11,color:"#94A3B8"}}>
          <span>📤 <strong style={{color:"#475569"}}>{getName(ticket.fromuserid,users)}</strong></span>
          <span>📥 <strong style={{color:"#475569"}}>{getName(ticket.touserid,users)}</strong></span>
          {ticket.cc && <span>📋 CC: {getName(ticket.cc,users)}</span>}
          <span>📅 Due: <strong style={{color:isOverdue(ticket.lastdate)?"#DC2626":isDueToday(ticket.lastdate)?"#D97706":"#475569"}}>{fmtDate(ticket.lastdate)}</strong></span>
          {ticket.differdateto && <span>🔄 Differ req: <strong style={{color:"#B45309"}}>{fmtDate(ticket.differdateto)}</strong></span>}
          {ticket.resolveddate && <span>✅ Resolved: {fmtDate(ticket.resolveddate)}</span>}
        </div>
      </div>

      {/* Chat */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        {logs.length===0 && (
          <div style={{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}}>
            <Ic n="chat" s={40} c="#CBD5E1"/>
            <p style={{marginTop:10,fontSize:13}}>No messages yet.</p>
          </div>
        )}
        {logs.map(log=>{
          const isMe = log.writerid===currentUser.id;
          if(log.system) return (
            <div key={log.id} style={{textAlign:"center",margin:"10px 0"}}>
              <span style={{fontSize:11,background:"#F1F5F9",color:"#64748B",borderRadius:20,padding:"3px 12px"}}>{log.message}</span>
            </div>
          );
          return (
            <div key={log.id} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginBottom:12,gap:8,alignItems:"flex-end"}}>
              {!isMe && <Av name={log.writer_name} id={log.writerid} size={28}/>}
              <div style={{maxWidth:"74%"}}>
                {!isMe && <p style={{margin:"0 0 3px",fontSize:10,color:"#94A3B8",fontWeight:700}}>{log.writer_name}</p>}
                <div style={{background:isMe?"#0F172A":"#fff",color:isMe?"#fff":"#0F172A",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"9px 13px",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
                  <p style={{margin:0,fontSize:13,lineHeight:1.5}}>{log.message}</p>
                </div>
                <p style={{margin:"3px 0 0",fontSize:10,color:"#94A3B8",textAlign:isMe?"right":"left"}}>{fmtDT(log.created_at)}</p>
              </div>
              {isMe && <Av name={log.writer_name} id={log.writerid} size={28}/>}
            </div>
          );
        })}
        <div ref={chatEnd}/>
      </div>

      {/* Input */}
      <div style={{background:"#fff",padding:"10px 12px",borderTop:"1px solid #F1F5F9",display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
        <textarea ref={inp} value={msg} onChange={e=>setMsg(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Type a message…" rows={1}
          style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:12,padding:"10px 12px",fontSize:13,resize:"none",outline:"none",fontFamily:"inherit",background:"#F8FAFC",color:"#0F172A",maxHeight:90}}/>
        <button onClick={send} disabled={!msg.trim()} style={{background:msg.trim()?"#0F172A":"#E2E8F0",border:"none",borderRadius:12,padding:"11px 14px",cursor:msg.trim()?"pointer":"not-allowed",display:"flex",flexShrink:0}}>
          <Ic n="send" s={16} c={msg.trim()?"#fff":"#94A3B8"}/>
        </button>
      </div>

      {/* Date Differ Modal */}
      {showDiffer && (
        <Modal title="Request Date Extension" sub="Admin will review your request" onClose={()=>setShowDiffer(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#FFFBEB",borderRadius:12,padding:"12px",border:"1px solid #FCD34D",fontSize:12,color:"#92400E"}}>
              ⚠️ Current deadline: <strong>{fmtDate(ticket.lastdate)}</strong>
            </div>
            <Field label="New Requested Date *">
              <input type="date" value={differDate} onChange={e=>setDifferDate(e.target.value)} min={TODAY} style={iSt}/>
            </Field>
            <Field label="Reason *">
              <textarea value={differRemark} onChange={e=>setDifferRemark(e.target.value)} style={{...iSt,minHeight:80,resize:"vertical"}} placeholder="Why do you need more time?"/>
            </Field>
            <Btn full label="Submit Extension Request" color="#B45309" bg="#FCD34D"
              onClick={()=>{ doStatus("REQ DIFFER DATE",differRemark,{differdateto:differDate}); setShowDiffer(false); addToast("📅","Date Extension Requested","Awaiting admin approval"); }}
              disabled={!differDate||!differRemark}/>
          </div>
        </Modal>
      )}

      {/* Admin Approve Modal */}
      {showApprove && (
        <Modal title="Review Date Extension" onClose={()=>setShowApprove(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#EFF6FF",borderRadius:12,padding:"12px",border:"1px solid #BFDBFE",fontSize:12,color:"#1E40AF"}}>
              Requested new date: <strong>{fmtDate(ticket.differdateto)}</strong><br/>
              {ticket.remark && <span>Reason: {ticket.remark}</span>}
            </div>
            <Field label="Approve With Date">
              <input type="date" value={approveDate} onChange={e=>setApproveDate(e.target.value)} min={TODAY} style={iSt}/>
            </Field>
            <Field label="Rejection Reason (if rejecting)">
              <textarea value={approveRemark} onChange={e=>setApproveRemark(e.target.value)} style={{...iSt,minHeight:70,resize:"vertical"}} placeholder="Optional…"/>
            </Field>
            <div style={{display:"flex",gap:10}}>
              <Btn full label="✓ Approve" color="#15803D" bg="#22C55E"
                onClick={()=>{ doStatus("PROCESSING","Approved",{lastdate:approveDate||ticket.differdateto}); setShowApprove(false); addToast("✅","Approved","New deadline set"); Sound.play("approve"); }}/>
              <Btn full label="✗ Reject" color="#9D174D" bg="#EC4899" disabled={!approveRemark}
                onClick={()=>{ doStatus("PENDING","Rejected",{}); setShowApprove(false); addToast("❌","Rejected","Original deadline stands"); Sound.play("reject"); }}/>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ══════════════════════════════════════════════════
// CREATE TICKET WIZARD
// ══════════════════════════════════════════════════
const CreateTicket = ({users,currentUser,onSave,onClose}) => {
  const [step,setStep] = useState(1);
  const [form,setForm] = useState({type:"COMPLAINT",touserid:[],cc:[],description:"",lastdate:PLUS1,necessaryAction:[],information:[]});
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const tog = (k,id) => setForm(p=>({...p,[k]:p[k].includes(id)?p[k].filter(i=>i!==id):[...p[k],id]}));
  const others = users.filter(u=>u.id!==currentUser.id);

  return (
    <Modal title="Create Ticket" sub="Complaint · Request · Advice · Report" onClose={onClose}>
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {[["1","Who & Type"],["2","Details"],["3","Review"]].map(([n,l],i)=>(
          <div key={n} style={{flex:1,textAlign:"center"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:step>i?"#0F172A":step===i+1?"#3B82F6":"#F1F5F9",color:step>i||step===i+1?"#fff":"#94A3B8",margin:"0 auto 4px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800}}>{step>i?"✓":n}</div>
            <span style={{fontSize:9,color:step===i+1?"#0F172A":"#94A3B8",fontWeight:700}}>{l}</span>
          </div>
        ))}
      </div>

      {step===1 && (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Type *">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {TICKET_TYPES.map(t=>{
                const [bg,tx]=TYPE_COLORS[t]||["#F1F5F9","#475569"];
                return <button key={t} onClick={()=>set("type",t)} style={{padding:"12px 8px",borderRadius:12,border:`2px solid ${form.type===t?tx:"#E2E8F0"}`,cursor:"pointer",background:form.type===t?bg:"#fff",color:form.type===t?tx:"#64748B",fontWeight:800,fontSize:12,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:18}}><TypeIcon type={t}/></span>{t}
                </button>;
              })}
            </div>
          </Field>
          <Field label="Send To *">
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {others.map(u=><PillToggle key={u.id} label={`${u.name}`} active={form.touserid.includes(u.id)} onClick={()=>tog("touserid",u.id)} color="#2563EB"/>)}
            </div>
            {form.touserid.length===0 && <p style={{margin:"5px 0 0",fontSize:10,color:"#EF4444"}}>Select at least one recipient</p>}
          </Field>
          <Field label="Due Date *">
            <input type="date" value={form.lastdate} onChange={e=>set("lastdate",e.target.value)} min={TODAY} style={iSt}/>
          </Field>
          <Btn full label="Next →" onClick={()=>setStep(2)} disabled={!form.touserid.length}/>
        </div>
      )}

      {step===2 && (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Description *">
            <textarea value={form.description} onChange={e=>set("description",e.target.value)} style={{...iSt,minHeight:100,resize:"vertical"}} placeholder="Describe clearly…"/>
          </Field>
          <Field label="CC (Optional)">
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {others.filter(u=>!form.touserid.includes(u.id)).map(u=><PillToggle key={u.id} label={u.name} active={form.cc.includes(u.id)} onClick={()=>tog("cc",u.id)} color="#7C3AED"/>)}
            </div>
          </Field>
          <Field label="🔴 Necessary Action Users">
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {others.map(u=><PillToggle key={u.id} label={u.name} active={form.necessaryAction.includes(u.id)} onClick={()=>tog("necessaryAction",u.id)} color="#EA580C"/>)}
            </div>
          </Field>
          <Field label="🟢 Information (FYI)">
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {others.map(u=><PillToggle key={u.id} label={u.name} active={form.information.includes(u.id)} onClick={()=>tog("information",u.id)} color="#0891B2"/>)}
            </div>
          </Field>
          <div style={{display:"flex",gap:8}}>
            <Btn full outline label="← Back" color="#64748B" onClick={()=>setStep(1)}/>
            <Btn full label="Review →" onClick={()=>setStep(3)} disabled={form.description.trim().length<5}/>
          </div>
        </div>
      )}

      {step===3 && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"#F8FAFC",borderRadius:14,padding:"14px",border:"1.5px solid #E2E8F0"}}>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <span style={{fontSize:22}}><TypeIcon type={form.type}/></span>
              <div>
                <p style={{margin:0,fontSize:14,fontWeight:800,color:"#0F172A"}}>{form.type}</p>
                <p style={{margin:0,fontSize:11,color:"#94A3B8"}}>Due {fmtDate(form.lastdate)}</p>
              </div>
            </div>
            <p style={{margin:"0 0 10px",fontSize:13,color:"#475569",lineHeight:1.5}}>{form.description}</p>
            <div style={{fontSize:11,color:"#64748B",lineHeight:1.8}}>
              <div>📥 To: <strong style={{color:"#0F172A"}}>{form.touserid.map(id=>users.find(u=>u.id===id)?.name).join(", ")}</strong></div>
              {form.cc.length>0 && <div>📋 CC: {form.cc.map(id=>users.find(u=>u.id===id)?.name).join(", ")}</div>}
            </div>
          </div>
          <div style={{background:"#FFFBEB",borderRadius:12,padding:"10px 12px",fontSize:11,color:"#92400E"}}>
            ⚡ This ticket will appear in todo list of all assigned users automatically.
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn full outline label="← Edit" color="#64748B" onClick={()=>setStep(2)}/>
            <Btn full label="🚀 Submit" bg="#0F172A" onClick={()=>onSave(form)} icon="send"/>
          </div>
        </div>
      )}
    </Modal>
  );
};

// TICKETS MODULE
// ══════════════════════════════════════════════════
const TicketsModule = ({users,currentUser,isAdmin,addToast,externalOpen,onExternalHandled,viewAsUser,onDataChange}) => {
  const [tickets,setTickets]   = useState([]);
  const [loading,setLoading]   = useState(true);
  const [chat,setChat]         = useState(null);
  const [creating,setCreating] = useState(false);
  const [filterStatus,setFilter]= useState("ALL");
  const [filterType,setFType]  = useState("ALL");
  const [search,setSearch]     = useState("");

  useEffect(()=>{
    API.call("GET","/tickets").then(d=>{ setTickets(d.data||[]); setLoading(false); }).catch(()=>setLoading(false));
  },[]);

  // Open create from dashboard
  useEffect(()=>{ if(externalOpen==="create"){ setCreating(true); onExternalHandled&&onExternalHandled(); } },[externalOpen]);

  const visible = tickets.filter(t=>{
    const uid = String(currentUser.id);
    const toIds=String(t.touserid||"").split(",").map(s=>s.trim());
    const ccIds=String(t.cc||"").split(",").map(s=>s.trim());
    // Filter by the effective user (viewAs or self)
    if(String(t.fromuserid)!==uid && !toIds.includes(uid) && !ccIds.includes(uid)) return false;
    if(filterStatus!=="ALL" && t.status!==filterStatus) return false;
    if(filterType!=="ALL" && t.type!==filterType) return false;
    if(search && !t.description?.toLowerCase().includes(search.toLowerCase()) && !String(t.id).includes(search)) return false;
    return true;
  });

  const handleStatusChange = (id,status,extra={}) => {
    setTickets(p=>p.map(t=>t.id===id?{...t,status,...extra,resolveddate:status==="RESOLVED"?TODAY:t.resolveddate}:t));
    API.call("POST",`/tickets/${id}/status`,{status,...extra}).then(()=>onDataChange&&onDataChange()).catch(()=>{});
  };

  const handleCreate = (form) => {
    const payload = {
      type: form.type,
      description: form.description,
      lastdate: form.lastdate,
      touserid: form.touserid,
      cc: form.cc || [],
      necessaryAction: form.necessaryAction || [],
      information: form.information || [],
    };
    setCreating(false); Sound.play("submit");
    addToast("🚀","Submitting…",`${form.type} ticket`);
    API.call("POST","/tickets",payload).then(d=>{
      if(d.success) {
        addToast("✅","Ticket Created",`${form.type} #${d.data?.id||""} saved`);
        // Refresh tickets list
        API.call("GET","/tickets").then(r=>setTickets(r.data||[])).catch(()=>{});
        if(onDataChange) onDataChange();
      } else {
        addToast("❌","Error",d.message||"Failed to create ticket");
      }
    }).catch(e=>{
      console.error("Create ticket error:",e);
      addToast("❌","Error","Could not create ticket. Check console.");
    });
  };

  if(chat) {
    const live = tickets.find(t=>t.id===chat.id)||chat;
    return <TicketChat ticket={live} users={users} currentUser={currentUser} isAdmin={isAdmin}
      onBack={()=>setChat(null)} onStatusChange={handleStatusChange} addToast={addToast}/>;
  }

  const overdue = tickets.filter(t=>isOverdue(t.lastdate)&&t.status!=="RESOLVED");
  const dateReqs = isAdmin ? tickets.filter(t=>t.status==="REQ DIFFER DATE") : [];

  return (
    <div className="sg-content" style={{paddingBottom:120}}>
      {overdue.length>0 && (
        <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
          <Ic n="warn" s={18} c="#DC2626"/>
          <p style={{margin:0,fontSize:12,color:"#DC2626",fontWeight:700}}>{overdue.length} ticket{overdue.length>1?"s":""} overdue! Immediate action needed.</p>
        </div>
      )}
      {dateReqs.length>0 && (
        <div onClick={()=>setFilter("REQ DIFFER DATE")} style={{background:"#FEF3C7",border:"1px solid #FDE68A",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"center",cursor:"pointer"}}>
          <Ic n="differ" s={18} c="#D97706"/>
          <p style={{margin:0,fontSize:12,color:"#D97706",fontWeight:700}}>{dateReqs.length} date extension request{dateReqs.length>1?"s":""} awaiting your approval</p>
        </div>
      )}

      {/* Stats */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[
          {l:"Open",    n:tickets.filter(t=>["PENDING","PROCESSING"].includes(t.status)).length, c:"#EF4444",bg:"#FEF2F2"},
          {l:"Overdue", n:overdue.length, c:"#DC2626",bg:"#FEE2E2"},
          {l:"Done",    n:tickets.filter(t=>t.status==="RESOLVED").length, c:"#22C55E",bg:"#DCFCE7"},
        ].map(s=>(
          <div key={s.l} style={{flex:1,background:s.bg,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.n}</div>
            <div style={{fontSize:9,fontWeight:800,color:s.c}}>{s.l.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tickets…" style={{...iSt,paddingLeft:36}}/>
        <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><Ic n="filter" s={14} c="#94A3B8"/></div>
      </div>

      {/* Type filter */}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:6}}>
        {["ALL","COMPLAINT","REQUEST","ADVICE","REPORT"].map(t=>(
          <PillToggle key={t} label={t==="ALL"?`All (${tickets.length})`:`${t}`} active={filterType===t} onClick={()=>setFType(t)}
            color={t==="COMPLAINT"?"#DC2626":t==="REQUEST"?"#2563EB":t==="ADVICE"?"#15803D":t==="REPORT"?"#7C3AED":"#475569"}/>
        ))}
      </div>

      {/* Status filter */}
      <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
        {["ALL","PENDING","PROCESSING","REQ DIFFER DATE","RESOLVED REQUEST","RESOLVED","NOT RESOLVED"].map(s=>(
          <PillToggle key={s} label={s} active={filterStatus===s} onClick={()=>setFilter(s)} color="#475569"/>
        ))}
      </div>

      {loading && <div style={{textAlign:"center",padding:"40px 0",color:"#94A3B8"}}>Loading…</div>}

      {!loading && visible.length===0 && (
        <div style={{textAlign:"center",padding:"50px 20px",color:"#94A3B8"}}>
          <Ic n="ticket" s={44} c="#CBD5E1"/>
          <p style={{marginTop:14,fontSize:14,fontWeight:600}}>No tickets found</p>
        </div>
      )}

      {visible.map(t=>{
        const st=STATUSES[t.status]||{bg:"#F1F5F9",tx:"#64748B",dot:"#94A3B8"};
        const od=isOverdue(t.lastdate)&&t.status!=="RESOLVED";
        return (
          <div key={t.id} onClick={()=>setChat(t)} style={{background:"#fff",borderRadius:16,padding:"14px",marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,.06)",cursor:"pointer",border:`1px solid ${od?"#FECACA":"#F1F5F9"}`,borderLeft:`4px solid ${od?"#EF4444":st.dot}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:6}}>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:15}}><TypeIcon type={t.type}/></span>
                <Chip label={t.type} bg={TYPE_COLORS[t.type]?.[0]||"#F1F5F9"} tx={TYPE_COLORS[t.type]?.[1]||"#475569"}/>
                <span style={{fontSize:10,color:"#94A3B8"}}>#{t.id}</span>
                {od && <Chip label="OVERDUE" bg="#FEE2E2" tx="#DC2626"/>}
              </div>
              <StatusChip status={t.status}/>
            </div>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:"#1E293B",lineHeight:1.4}}>{(t.description||"").slice(0,80)}{(t.description||"").length>80?"…":""}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:"3px 14px",fontSize:11,color:"#94A3B8",marginBottom:8}}>
              <span>📤 {getName(t.fromuserid,users)}</span>
              <span>📥 {getName(t.touserid,users)}</span>
              <span>📅 {fmtDate(t.lastdate)}</span>
              <DuePill date={t.lastdate}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>{t.differdateto && t.status==="REQ DIFFER DATE" && <Chip label="📅 Date differ pending" bg="#FFFBEB" tx="#B45309"/>}</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {(t.logs||[]).length>0 && <span style={{fontSize:10,color:"#64748B"}}>💬 {(t.logs||[]).length}</span>}
                <Ic n="chat" s={14} c="#94A3B8"/>
              </div>
            </div>
          </div>
        );
      })}

      {creating && <CreateTicket users={users} currentUser={currentUser} onSave={handleCreate} onClose={()=>setCreating(false)}/>}

      <button onClick={()=>setCreating(true)} style={{position:"fixed",bottom:105,right:20,background:"#EF4444",color:"#fff",border:"none",borderRadius:50,width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(239,68,68,.4)",cursor:"pointer",zIndex:100}}>
        <Ic n="plus" s={24} c="#fff"/>
      </button>
    </div>
  );
};

// ADD TODO MODAL (reusable)
// ══════════════════════════════════════════════════
const AddTodoModal = ({users,currentUser,existing,onSave,onClose}) => {
  const blank = {description:"",dateType:"fixedDate",date:TODAY,time:"",recurringSubType:"every_day",recurringDynamic:"",copyTo:[]};
  const [form,setForm] = useState(existing ? {
    description:existing.description, dateType:existing.recurring_date?"recurringDate":"fixedDate",
    date:existing.date||TODAY, time:existing.time?existing.time.slice(0,5):"",
    recurringSubType:existing.recurring_date||"every_day", recurringDynamic:"", copyTo:String(existing.necessaryAction||"").split(",").filter(Boolean).map(Number)
  } : blank);
  const togCT = id => setForm(p=>({...p,copyTo:p.copyTo.includes(id)?p.copyTo.filter(i=>i!==id):[...p.copyTo,id]}));
  const buildRec = () => {
    if(form.recurringSubType==="every_day")   return "every_day";
    if(form.recurringSubType==="day_of_Week") return form.recurringDynamic||"Monday";
    if(form.recurringSubType==="date_wise")   return String(form.recurringDynamic||"1").padStart(2,"0");
    if(form.recurringSubType==="day_wise")    return form.recurringDynamic||"Monday";
    return form.recurringSubType;
  };
  const save = () => {
    const todo = {
      id:existing?existing.id:Date.now(), userid:currentUser.id,
      description:form.description,
      date:form.dateType==="fixedDate"?form.date:null,
      time:form.time?(form.time.length===5?form.time+":00":form.time):"00:00:00",
      status:existing?existing.status:0,
      recurring_date:form.dateType==="recurringDate"?buildRec():null,
      necessaryAction:form.copyTo.join(","), information:"",
    };
    onSave(todo);
    onClose();
  };
  return (
    <Modal title={existing?"EDIT TODO":"ADD TODO"} onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:0}}>
        <div style={{background:"#E8690A",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <Ic n="todo" s={16} c="#fff"/>
          <span style={{color:"#fff",fontWeight:900,fontSize:13,letterSpacing:.5}}>{existing?"EDIT TODO":"ADD TODO"}</span>
        </div>
        <div style={{marginBottom:14}}>
          <label style={iLbl}>Notes</label>
          <textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="Enter notes" rows={3} style={{...iSt,resize:"vertical",minHeight:72}}/>
        </div>
        <div style={{marginBottom:14,display:"flex",alignItems:"center",gap:16}}>
          {[["fixedDate","Fixed Date"],["recurringDate","Recurring Date/Day"]].map(([v,l])=>(
            <label key={v} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:"#475569",fontWeight:form.dateType===v?800:500}}>
              <div onClick={()=>setForm(p=>({...p,dateType:v}))} style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${form.dateType===v?"#E8690A":"#CBD5E1"}`,background:form.dateType===v?"#E8690A":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}}>
                {form.dateType===v && <div style={{width:7,height:7,borderRadius:"50%",background:"#fff"}}/>}
              </div>
              {l}
            </label>
          ))}
        </div>
        {form.dateType==="fixedDate" ? (
          <div style={{marginBottom:14}}>
            <label style={iLbl}>Fixed Date</label>
            <input type="date" value={form.date} min={TODAY} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={iSt}/>
            <p style={{margin:"4px 0 0",fontSize:10,color:"#E8690A"}}>*tap to change the date</p>
          </div>
        ) : (
          <div style={{marginBottom:14}}>
            <label style={iLbl}>Recurring Pattern</label>
            <select value={form.recurringSubType} onChange={e=>setForm(p=>({...p,recurringSubType:e.target.value,recurringDynamic:""}))} style={iSt}>
              <option value="">Select</option>
              <option value="every_day">Every Day</option>
              <option value="day_wise">Day Wise</option>
              <option value="date_wise">Date Wise</option>
              <option value="day_of_Week">Day of Week</option>
            </select>
            {(form.recurringSubType==="day_of_Week"||form.recurringSubType==="day_wise") && (
              <select value={form.recurringDynamic} onChange={e=>setForm(p=>({...p,recurringDynamic:e.target.value}))} style={{...iSt,marginTop:8}}>
                <option value="">Select Day</option>
                {["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            )}
            {form.recurringSubType==="date_wise" && (
              <select value={form.recurringDynamic} onChange={e=>setForm(p=>({...p,recurringDynamic:e.target.value}))} style={{...iSt,marginTop:8}}>
                <option value="">Select Date of Month</option>
                {Array.from({length:31},(_,i)=>i+1).map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            )}
          </div>
        )}
        <div style={{marginBottom:14}}>
          <label style={iLbl}>Time</label>
          <input type="time" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))} style={iSt}/>
          <p style={{margin:"4px 0 0",fontSize:10,color:"#E8690A"}}>*tap to change the time</p>
        </div>
        <div style={{marginBottom:20}}>
          <label style={iLbl}>Copy To</label>
          <div style={{border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",background:"#F8FAFC",minHeight:44}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {users.filter(u=>u.id!==currentUser.id).map(u=>(
                <button key={u.id} onClick={()=>togCT(u.id)} style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                  background:form.copyTo.includes(u.id)?"#E8690A":"#F1F5F9",color:form.copyTo.includes(u.id)?"#fff":"#475569"}}>
                  {form.copyTo.includes(u.id)?"✓ ":""}{u.name}
                </button>
              ))}
            </div>
          </div>
        </div>
        <button onClick={save} disabled={!form.description.trim()} style={{
          background:form.description.trim()?"#22C55E":"#E2E8F0",
          color:form.description.trim()?"#fff":"#94A3B8",
          border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:900,
          cursor:form.description.trim()?"pointer":"not-allowed",width:"100%"}}>
          {existing?"UPDATE":"ADD"}
        </button>
      </div>
    </Modal>
  );
};

// TODO MODULE
// ══════════════════════════════════════════════════
const TodoModule = ({users,currentUser,addToast,externalOpen,onExternalHandled,viewAsUser,isAdmin,onDataChange}) => {
  const [todos,setTodos]   = useState([]);
  const [loading,setLoading] = useState(true);
  const [dayFilter,setDay] = useState("today");
  const [showAdd,setShowAdd]   = useState(false);
  const [editTodo,setEditTodo] = useState(null);
  const [search,setSearch]     = useState("");
  const [statusFilter,setStatusFilter] = useState("ALL");
  const dayMap = {today:TODAY,tomorrow:PLUS1,dat:PLUS2,all:"ALL"};

  useEffect(()=>{
    API.call("GET","/todos").then(d=>{
      setTodos(d.data||[]); setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  useEffect(()=>{ if(externalOpen==="add"){ setShowAdd(true); onExternalHandled&&onExternalHandled(); } },[externalOpen]);

  const visible = todos.filter(t=>{
    const uid=String(currentUser.id);
    const tStatus = Number(t.status);
    // Filter by the effective user (viewAs or self)
    const inAction=String(t.necessaryAction||"").split(",").map(s=>s.trim()).includes(uid);
    const inInfo=String(t.information||"").split(",").map(s=>s.trim()).includes(uid);
    if(String(t.userid)!==uid && !inAction && !inInfo) return false;
    // Day filter — recurring todos should match their pattern
    const isRecurring = !!t.recurring_date;
    const recurMatch = isRecurring && (
      t.recurring_date==="every_day" ||
      t.recurring_date===new Date().toLocaleDateString("en-US",{weekday:"long"}) ||
      t.recurring_date===String(new Date().getDate()) ||
      t.recurring_date===String(new Date().getDate()).padStart(2,"0") ||
      t.recurring_date===(String(new Date().getDate())+["th","st","nd","rd"][(new Date().getDate()%10>3||[11,12,13].includes(new Date().getDate()))?0:new Date().getDate()%10])
    );
    if(dayFilter==="today") {
      if(!(t.date===TODAY || recurMatch || (!t.date && !t.recurring_date))) return false;
    } else if(dayFilter!=="all") {
      if(!isRecurring && t.date!==dayMap[dayFilter]) return false;
      if(isRecurring && t.date && t.date!==dayMap[dayFilter]) return false;
    }
    // Status filter
    if(statusFilter==="PENDING" && tStatus!==1) return false;
    if(statusFilter==="DONE" && tStatus!==0) return false;
    // Keyword search
    if(search && !t.description?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const markDone = id => {
    setTodos(p=>p.map(t=>t.id===id?{...t,status:0}:t));
    Sound.play("resolve"); addToast("✅","Done","Task marked complete");
    API.call("POST",`/todos/${id}/status`,{status:0}).then(()=>onDataChange&&onDataChange()).catch(()=>{});
  };
  const del = id => { setTodos(p=>p.filter(t=>t.id!==id)); API.call("DELETE",`/todos/${id}`).then(()=>onDataChange&&onDataChange()).catch(()=>{}); };

  const handleSave = (todo) => {
    if(editTodo) setTodos(p=>p.map(t=>t.id===todo.id?todo:t));
    else setTodos(p=>[todo,...p]);
    Sound.play("submit"); addToast("📋",editTodo?"Task Updated":"Task Added",todo.description.slice(0,40));
    {
      const call = editTodo ? API.call("PUT",`/todos/${todo.id}`,todo) : API.call("POST","/todos",todo);
      call.then(()=>onDataChange&&onDataChange()).catch(()=>{});
    }
    setEditTodo(null);
  };

  const dayBtns = [["today","Today",TODAY,"#059669"],["tomorrow","Tmrw",PLUS1,"#2563EB"],["dat","+2 Days",PLUS2,"#D97706"],["all","All","ALL","#6366F1"]];

  return (
    <div className="sg-content" style={{paddingBottom:120}}>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {dayBtns.map(([k,l,d,c])=>(
          <button key={k} onClick={()=>setDay(k)} style={{flex:1,padding:"9px 4px",borderRadius:12,border:"none",cursor:"pointer",fontWeight:800,fontSize:10,background:dayFilter===k?c:"#F1F5F9",color:dayFilter===k?"#fff":"#64748B",lineHeight:1.3}}>
            {l}{d!=="ALL" && <><br/><span style={{fontWeight:400,fontSize:9}}>{new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short"})}</span></>}
          </button>
        ))}
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:8}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tasks…" style={{...iSt,paddingLeft:36}}/>
        <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><Ic n="filter" s={14} c="#94A3B8"/></div>
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#94A3B8"}}>✕</button>}
      </div>

      {/* Status filter */}
      <div style={{display:"flex",gap:6,marginBottom:isAdmin?8:10}}>
        {[["ALL","All","#475569"],["PENDING","Pending","#EF4444"],["DONE","Done","#22C55E"]].map(([k,l,c])=>(
          <PillToggle key={k} label={l} active={statusFilter===k} onClick={()=>setStatusFilter(k)} color={c}/>
        ))}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[{l:"Pending",n:visible.filter(t=>Number(t.status)===1).length,c:"#EF4444",bg:"#FEF2F2"},{l:"Done",n:visible.filter(t=>Number(t.status)===0).length,c:"#22C55E",bg:"#DCFCE7"},{l:"Total",n:visible.length,c:"#6366F1",bg:"#EEF2FF"}].map(s=>(
          <div key={s.l} style={{flex:1,background:s.bg,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.n}</div>
            <div style={{fontSize:9,fontWeight:800,color:s.c}}>{s.l.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {loading && <div style={{textAlign:"center",padding:"40px 0",color:"#94A3B8"}}>Loading…</div>}

      {!loading && visible.length===0 && (
        <div style={{textAlign:"center",padding:"50px 20px",color:"#94A3B8"}}>
          <Ic n="check" s={44} c="#CBD5E1"/><p style={{marginTop:14,fontSize:14,fontWeight:600}}>All clear for this day!</p>
        </div>
      )}

      {visible.map(todo=>{
        const isDone=Number(todo.status)===0;
        const actU=(todo.necessaryAction||"").split(",").filter(Boolean).map(i=>users.find(u=>u.id==i.trim())).filter(Boolean);
        return (
          <div key={todo.id} style={{background:isDone?"#F0FDF4":"#fff",borderRadius:16,padding:"13px 14px",marginBottom:9,
            boxShadow:isDone?"none":"0 2px 10px rgba(0,0,0,.06)",
            border:isDone?"1px solid #BBF7D0":"1px solid #F1F5F9",
            borderLeft:`4px solid ${isDone?"#22C55E":"#6366F1"}`}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 5px",fontSize:13,fontWeight:700,color:isDone?"#6B7280":"#0F172A",textDecoration:isDone?"line-through":"none",lineHeight:1.4}}>{todo.description}</p>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:10,color:"#94A3B8"}}>🕐 {fmtTime(todo.time)}</span>
                  {todo.recurring_date && <Chip label={`🔁 ${todo.recurring_date==="every_day"?"Daily":todo.recurring_date}`} bg="#EFF6FF" tx="#3B82F6"/>}
                </div>
                {actU.length>0 && <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:9,color:"#EA580C",fontWeight:800}}>ACTION →</span>
                  {actU.map(u=><Chip key={u.id} label={u.name} bg="#FFF7ED" tx="#EA580C"/>)}

              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {!isDone && <button onClick={()=>markDone(todo.id)} style={{background:"#DCFCE7",border:"none",borderRadius:10,padding:"7px",cursor:"pointer"}}><Ic n="check" s={14} c="#22C55E"/></button>}

      })}

      {(showAdd||editTodo) && (
        <AddTodoModal users={users} currentUser={currentUser} existing={editTodo}

  );

const RemindersModule = ({reminders,setReminders,addToast}) => {
  const [showAdd,setShowAdd]=useState(false);

  const SOUNDS=["notify","urgent","message","resolve","reject","reminder","submit","approve"];

  const save = () => {
    const r = {id:Date.now(),userid:1,message:form.message,time:form.time,repeat:form.repeat,sound:form.sound,active:true,snooze_count:0};
    setReminders(p=>[...p,r]); Sound.play(form.sound); addToast("⏰","Reminder Set",form.message.slice(0,40));
    setShowAdd(false); setForm({message:"",time:"09:00",repeat:"once",sound:"reminder"});

  };
  const tog = id => setReminders(p=>p.map(r=>r.id===id?{...r,active:!r.active}:r));

  return (
    <div className="sg-content" style={{paddingBottom:120}}>

        <span style={{fontSize:13,color:"#64748B",marginLeft:8}}>of {reminders.length} total</span>
      </div>

        <div key={r.id} style={{background:r.active?"#fff":"#F8FAFC",borderRadius:16,padding:"14px",marginBottom:10,boxShadow:r.active?"0 2px 10px rgba(0,0,0,.06)":"none",border:r.active?"1px solid #F1F5F9":"1px dashed #E2E8F0",opacity:r.active?1:.6}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{width:44,height:44,borderRadius:12,background:r.active?"#FEF3C7":"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Ic n="alarm" s={20} c={r.active?"#D97706":"#94A3B8"}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{margin:"0 0 3px",fontSize:13,fontWeight:700,color:"#0F172A",lineHeight:1.3}}>{r.message}</p>

      <button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:105,right:20,background:"#D97706",color:"#fff",border:"none",borderRadius:50,width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(217,119,6,.4)",cursor:"pointer",zIndex:100}}>
