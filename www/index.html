// ROOT APP
// ══════════════════════════════════════════════════
function App() {
  const savedUser = localStorage.getItem("sg_user");
  const [user,setUser]         = useState(savedUser ? JSON.parse(savedUser) : null);
  const [users,setUsers]       = useState([]);
  const [tickets,setTickets]   = useState([]);
  const [todos,setTodos]       = useState([]);
  const [reminders,setReminders] = useState([]);
  const [tab,setTab]           = useState("home");
  const [toasts,setToasts]     = useState([]);
  const [activeAlarm,setAlarm] = useState(null);
  const [dashAction,setDashAction] = useState(null); // "createTicket" | "addTodo"
  const [dashLoaded,setDashLoaded] = useState(false);
  const [viewAs,setViewAs] = useState(null); // null = self, user object = viewing as that user
  const [showViewAs,setShowViewAs] = useState(false);
  const [viewAsSearch,setViewAsSearch] = useState("");
  const [showNotif,setShowNotif] = useState(false);

  const addToast = useCallback((icon,title,body,persistent=false)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p.slice(-6),{id,icon,title,body,persistent}]);
    if(!persistent) setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),8000);
  },[]);

  // Load data from API — used on login AND on page refresh
  const loadAllData = useCallback(() => {
    setDashLoaded(false);
    Promise.all([
      API.call("GET","/users").then(d=>setUsers(d.data||[])).catch(()=>{}),
      API.call("GET","/tickets").then(d=>setTickets(d.data||[])).catch(()=>{}),
      API.call("GET","/todos").then(d=>setTodos(d.data||[])).catch(()=>{}),
      API.call("GET","/reminders").then(d=>setReminders(d.data||[])).catch(()=>{}),
    ]).finally(()=>setDashLoaded(true));
  }, []);

  // On page refresh: if user exists in localStorage, load data immediately
  useEffect(() => {
    if(user && API.token) {
      loadAllData();
    }
  }, []); // runs once on mount

  // FCM token registration — runs on every app open, always listens for native token
  // This ensures token is ALWAYS fresh even after reinstall
  useEffect(() => {
    const sendTokenToServer = (fcmToken) => {
      if(!fcmToken || !API.token) return;
      console.log("Sending FCM token to server:", fcmToken.substring(0,20) + "...");
      API.call("POST","/register-device",{token:fcmToken}).then(()=>{
        console.log("FCM token registered with server successfully");
      }).catch(e=>console.error("Token register failed:",e));
    };
    // Always set up the listener for native code injection
    window._onFCMToken = sendTokenToServer;
    // Check if token was already injected
    if(window._FCM_TOKEN && user && API.token) {
      sendTokenToServer(window._FCM_TOKEN);
    }
    // Also re-check every 5 seconds for 30 seconds (in case native code is slow)
    if(user && API.token) {
      let checks = 0;
      const interval = setInterval(()=>{
        checks++;
        if(window._FCM_TOKEN) { sendTokenToServer(window._FCM_TOKEN); clearInterval(interval); }
        if(checks >= 6) clearInterval(interval);
      }, 5000);
      return ()=>clearInterval(interval);
    }
  }, [user]); // re-runs whenever user changes (login/logout)

  const [showLogoutConfirm,setShowLogoutConfirm] = useState(false);
  const [showThankYou,setShowThankYou] = useState(false);
  const [showNotifGuide,setShowNotifGuide] = useState(false);

  const handleLogin = (u) => {
    setUser(u);
    loadAllData();
    // Check if notification guide was shown before
    if(!localStorage.getItem("sg_notif_guide_done")) {
      setTimeout(()=>setShowNotifGuide(true), 3000);
    }
  };

  const handleLogout = () => {
    setShowLogoutConfirm(true);
  };

  const doSwitchUser = () => {
    setShowLogoutConfirm(false);
    setShowThankYou(true);
    setTimeout(()=>{
      API.logout(); setUser(null);
      localStorage.removeItem("sg_user");
      localStorage.removeItem("sg_remember"); // clear saved credentials
      setShowThankYou(false);
    }, 2000);
  };

  const doLogoutCompletely = () => {
    setShowLogoutConfirm(false);
    setShowThankYou(true);
    setTimeout(()=>{
      // Clear everything including FCM token from server
      API.call("POST","/register-device",{token:"CLEARED"}).catch(()=>{});
      API.logout(); setUser(null);
      localStorage.removeItem("sg_user");
      localStorage.removeItem("sg_remember");
      localStorage.removeItem("sg_token");
      setShowThankYou(false);
    }, 2000);
  };

  // Reminder engine
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const hhmm=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      reminders.forEach(r=>{ if(r.active&&!activeAlarm&&r.time===hhmm) setAlarm(r); });
    };
    const iv=setInterval(check,30000);
    return ()=>clearInterval(iv);
  },[reminders,activeAlarm]);

  // ─── PHASE 1: TODAY'S TASK NOTIFICATION ENGINE ───────────────────────────
  const lastHourChecked = useRef(-1);

  useEffect(()=>{
    if(!user) return;

    // Request browser notification permission
    if("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }

    const playChime = () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch(e){}
    };

    const notifyPendingTasks = (source) => {
      // Fetch FRESH todos from API
      API.call("GET","/todos").then(d => {
        const allTodos = d.data || [];
        const uid = String(user.id);
        const today = new Date().toISOString().split("T")[0];

        const pendingToday = allTodos.filter(t => {
          const isToday = t.date === today || t.recurring_date === "every_day" || (!t.date && !t.recurring_date);
          const isPending = Number(t.status) === 1;
          const inAction = String(t.necessaryAction||"").split(",").map(s=>s.trim()).includes(uid);
          const isOwn = String(t.userid) === uid;
          return isToday && isPending && (isOwn || inAction);
        });

        if(pendingToday.length === 0) return;

        // Play chime sound
        playChime();

        // In-app toast for each task (max 5)
        pendingToday.slice(0,5).forEach((t, i) => {
          setTimeout(() => {
            addToast("🔔", "Pending Task", t.description.substring(0, 55) + (t.description.length > 55 ? "…" : ""), true);
          }, i * 1200);
        });
        if(pendingToday.length > 5) {
          setTimeout(()=> addToast("🔔", "Pending Tasks", `+${pendingToday.length - 5} more tasks pending today`, true), 5 * 1200);
        }

        // Browser notification
        if("Notification" in window && Notification.permission === "granted") {
          const hour = new Date().getHours();
          try {
            new Notification("⏰ Status Gear — " + pendingToday.length + " Pending", {
              body: pendingToday.slice(0,3).map(t=>t.description.substring(0,40)).join("\n"),
              icon: "/favicon.ico",
              tag: "task-reminder-" + source
            });
          } catch(e){}
        }

        // Also refresh app state
        setTodos(allTodos);
      }).catch(()=>{});
    };

    const checkHourly = () => {
      const now = new Date();
      const hour = now.getHours();
      // Only between 7AM and 9PM
      if(hour < 7 || hour >= 21) return;
      // Only fire once per hour
      if(hour === lastHourChecked.current) return;
      lastHourChecked.current = hour;
      notifyPendingTasks("hourly-" + hour);
    };

    // Fire immediately on app load (after 5s to let data load)
    const loadTimer = setTimeout(() => notifyPendingTasks("load"), 5000);

    // Check every 30 seconds for hour change (so we never miss it)
    const iv = setInterval(checkHourly, 30000);
    return () => { clearInterval(iv); clearTimeout(loadTimer); };
  }, [user]);

  // ─── NEW TICKET/TASK ASSIGNMENT ALERT (polls every 30s) ────────────────
  const knownTicketIds = useRef(new Set());
  const knownTodoIds = useRef(new Set());
  const isFirstLoad = useRef(true);

  useEffect(()=>{
    if(!user) return;

    const playUrgent = () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0,0.2,0.4].forEach(delay => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 1047;
          gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.15);
        });
      } catch(e){}
    };

    const pollForNew = () => {
      const uid = String(user.id);

      // Poll tickets
      API.call("GET","/tickets").then(d=>{
        const allTickets = d.data || [];
        if(isFirstLoad.current) {
          allTickets.forEach(t => knownTicketIds.current.add(t.id));
          isFirstLoad.current = false;
          setTickets(allTickets); // always update app state
          return;
        }
        const newForMe = allTickets.filter(t => {
          if(knownTicketIds.current.has(t.id)) return false;
          const toIds = String(t.touserid||"").split(",").map(s=>s.trim());
          const ccIds = String(t.cc||"").split(",").map(s=>s.trim());
          return toIds.includes(uid) || ccIds.includes(uid);
        });
        newForMe.forEach(t => {
          knownTicketIds.current.add(t.id);
          playUrgent();
          addToast("📨", `New ${t.type}!`, `${t.description.substring(0,50)}`, true);
          if("Notification" in window && Notification.permission === "granted") {
            try { new Notification(`📨 New ${t.type}!`, { body: t.description.substring(0,80), icon: "/favicon.ico", tag: `ticket-${t.id}` }); } catch(e){}
          }
        });
        setTickets(allTickets); // always refresh app state
      }).catch(()=>{});

      // Poll todos
      API.call("GET","/todos").then(d=>{
        const allTodos = d.data || [];
        const newForMe = allTodos.filter(t => {
          if(knownTodoIds.current.has(t.id)) return false;
          const inAction = String(t.necessaryAction||"").split(",").map(s=>s.trim()).includes(uid);
          return inAction;
        });
        newForMe.forEach(t => {
          knownTodoIds.current.add(t.id);
          playUrgent();
          addToast("📋", "New Task Assigned!", t.description.substring(0,60), true);
          if("Notification" in window && Notification.permission === "granted") {
            try { new Notification("📋 New Task!", { body: t.description.substring(0,80), icon: "/favicon.ico", tag: `todo-${t.id}` }); } catch(e){}
          }
        });
        allTodos.forEach(t => knownTodoIds.current.add(t.id));
        setTodos(allTodos); // always refresh app state
      }).catch(()=>{});
    };

    // Poll every 30 seconds
    const iv = setInterval(pollForNew, 30000);
    setTimeout(pollForNew, 2000);
    return () => clearInterval(iv);
  }, [user]);

  const dismissAlarm = () => {
    if(activeAlarm?.repeat==="once") setReminders(p=>p.map(r=>r.id===activeAlarm.id?{...r,active:false}:r));
    setAlarm(null);
  };
  const snoozeAlarm = () => {
    setReminders(p=>p.map(r=>r.id===activeAlarm?.id?{...r,snooze_count:(r.snooze_count||0)+1}:r));
    const saved=activeAlarm; setAlarm(null);
    addToast("😴","Snoozed","Reminder in 5 minutes");
    setTimeout(()=>setAlarm(saved),5*60*1000);
  };

  if(!user) return <LoginScreen onLogin={handleLogin}/>;

  const isAdmin = user.usertype==="MASTER ADMIN";
  const effectiveUser = viewAs || user; // who we're viewing data for
  const viewingOther = viewAs && viewAs.id !== user.id;

  // Filter data based on viewAs user
  const myTickets = tickets.filter(t => {
    const uid = String(effectiveUser.id);
    const toIds = String(t.touserid||"").split(",").map(s=>s.trim());
    const ccIds = String(t.cc||"").split(",").map(s=>s.trim());
    return String(t.fromuserid)===uid || toIds.includes(uid) || ccIds.includes(uid);
  });
  const myTodos = todos.filter(t => {
    const uid = String(effectiveUser.id);
    const inAction = String(t.necessaryAction||"").split(",").map(s=>s.trim()).includes(uid);
    const inInfo = String(t.information||"").split(",").map(s=>s.trim()).includes(uid);
    return String(t.userid)===uid || inAction || inInfo;
  });

  const pendingN = myTickets.filter(t=>["PENDING","PROCESSING","REQ DIFFER DATE"].includes(t.status)).length;
  const overdueN = myTickets.filter(t=>isOverdue(t.lastdate)&&t.status!=="RESOLVED").length;
  const badgeN   = pendingN + overdueN;

  const TABS = [
    {k:"home",     i:"home",   l:"Home"},
    {k:"tickets",  i:"ticket", l:"Tickets",  badge:badgeN},
    {k:"todo",     i:"todo",   l:"Todos"},
    {k:"reminders",i:"alarm",  l:"Reminders",badge:reminders.filter(r=>r.active).length},
  ];

  return (
    <div id="root" style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#F8FAFC",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif"}}>
      {/* Header */}
      <div className="sg-header" style={{background:"#fff",padding:"13px 16px 10px",position:"sticky",top:0,zIndex:50,borderBottom:"1px solid #F1F5F9",boxShadow:"0 1px 8px rgba(0,0,0,.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{margin:0,fontSize:9,color:"#94A3B8",letterSpacing:2,fontWeight:800}}>STATUS GEAR 1.0V</p>
            <h1 style={{margin:0,fontSize:18,fontWeight:900,color:"#0F172A"}}>{{home:"Dashboard",tickets:"Tickets",todo:"My Todo List",reminders:"Reminders"}[tab]}</h1>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{position:"relative"}}>
              <button onClick={()=>{setShowNotif(!showNotif);Sound.play("notify");}} style={{background:"#F1F5F9",border:"none",borderRadius:50,padding:8,cursor:"pointer",display:"flex"}}>
                <Ic n="bell" s={18} c="#475569"/>
              </button>
              {badgeN>0 && <div style={{position:"absolute",top:2,right:2,width:17,height:17,background:"#EF4444",borderRadius:"50%",fontSize:9,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,border:"2px solid #fff"}}>{badgeN}</div>}
              {/* Notification panel */}
              {showNotif && (
                <div style={{position:"absolute",top:44,right:0,width:300,background:"#fff",borderRadius:14,boxShadow:"0 8px 30px rgba(0,0,0,.15)",border:"1px solid #E2E8F0",zIndex:999,maxHeight:400,overflowY:"auto"}}>
                  <div style={{padding:"12px 14px",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,fontWeight:800,color:"#0F172A"}}>🔔 Notifications</span>
                    <button onClick={()=>setShowNotif(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#94A3B8"}}>✕</button>
                  </div>
                  {myTickets.filter(t=>isOverdue(t.lastdate)&&t.status!=="RESOLVED").map(t=>(
                    <div key={"ot"+t.id} onClick={()=>{setTab("tickets");setShowNotif(false);}} style={{padding:"10px 14px",borderBottom:"1px solid #F8FAFC",cursor:"pointer"}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#DC2626",fontWeight:800}}>🔴 OVERDUE</span>
                        <span style={{fontSize:10,color:"#94A3B8"}}>#{t.id}</span>
                      </div>
                      <p style={{margin:"3px 0 0",fontSize:12,color:"#475569"}}>{(t.description||"").slice(0,50)}</p>
                    </div>
                  ))}
                  {myTickets.filter(t=>["PENDING","PROCESSING"].includes(t.status)&&!isOverdue(t.lastdate)).map(t=>(
                    <div key={"pt"+t.id} onClick={()=>{setTab("tickets");setShowNotif(false);}} style={{padding:"10px 14px",borderBottom:"1px solid #F8FAFC",cursor:"pointer"}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#F59E0B",fontWeight:800}}>🟡 {t.status}</span>
                        <span style={{fontSize:10,color:"#94A3B8"}}>#{t.id}</span>
                      </div>
                      <p style={{margin:"3px 0 0",fontSize:12,color:"#475569"}}>{(t.description||"").slice(0,50)}</p>
                    </div>
                  ))}
                  {myTodos.filter(t=>Number(t.status)===1&&(t.date===TODAY||t.recurring_date==="every_day"||(!t.date&&!t.recurring_date))).slice(0,5).map(t=>(
                    <div key={"td"+t.id} onClick={()=>{setTab("todo");setShowNotif(false);}} style={{padding:"10px 14px",borderBottom:"1px solid #F8FAFC",cursor:"pointer"}}>
                      <div style={{fontSize:10,color:"#059669",fontWeight:800}}>📋 Pending Task</div>
                      <p style={{margin:"3px 0 0",fontSize:12,color:"#475569"}}>{(t.description||"").slice(0,50)}</p>
                    </div>
                  ))}
                  {badgeN===0 && myTodos.filter(t=>Number(t.status)===1).length===0 && (
                    <div style={{padding:"20px",textAlign:"center",color:"#94A3B8",fontSize:12}}>✅ All clear! No pending items.</div>
                  )}
                </div>
              )}
            </div>
            <button onClick={handleLogout} style={{background:"#F1F5F9",border:"none",borderRadius:50,padding:8,cursor:"pointer",display:"flex"}} title="Logout">
              <Ic n="logout" s={18} c="#64748B"/>
            </button>
            <Av name={user.name} id={user.id} size={36}/>
          </div>
        </div>
        {/* Admin: View As switcher */}
        {isAdmin && (
          <div style={{marginTop:8}}>
            <div onClick={()=>setShowViewAs(!showViewAs)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:viewingOther?"#EFF6FF":"#F8FAFC",borderRadius:10,cursor:"pointer",border:viewingOther?"1.5px solid #3B82F6":"1.5px solid #E2E8F0"}}>
              <span style={{fontSize:11,color:"#64748B"}}>👁️ Viewing as:</span>
              <span style={{fontSize:12,fontWeight:800,color:viewingOther?"#2563EB":"#0F172A",flex:1}}>{effectiveUser.name}</span>
              <span style={{fontSize:10,color:"#94A3B8"}}>{showViewAs?"▲":"▼"}</span>
              {viewingOther && <button onClick={e=>{e.stopPropagation();setViewAs(null);setShowViewAs(false);}} style={{background:"#EF4444",border:"none",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#fff",fontWeight:700,cursor:"pointer"}}>✕ Reset</button>}
            </div>
            {showViewAs && (
              <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,marginTop:6,maxHeight:320,overflowY:"auto",boxShadow:"0 4px 20px rgba(0,0,0,.1)"}}>
                {/* Search box */}
                <div style={{padding:"8px 10px",borderBottom:"1px solid #F1F5F9",position:"sticky",top:0,background:"#fff",zIndex:1}}>
                  <input value={viewAsSearch} onChange={e=>setViewAsSearch(e.target.value)} placeholder="🔍 Type name to search..." autoFocus
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #E2E8F0",fontSize:12,color:"#0F172A",outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div onClick={()=>{setViewAs(null);setShowViewAs(false);setViewAsSearch("");}} style={{padding:"10px 14px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:!viewingOther?"#EFF6FF":"transparent"}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#0F172A"}}>{user.name}</span>
                  <span style={{fontSize:10,color:"#64748B",marginLeft:6}}>(Me)</span>
                </div>
                {users.filter(u=>{
                  if(u.id===user.id) return false;
                  if(!viewAsSearch) return true;
                  const q = viewAsSearch.toLowerCase();
                  return u.name?.toLowerCase().includes(q) || u.username?.toLowerCase().includes(q) || u.usertype?.toLowerCase().includes(q);
                }).map(u=>(
                  <div key={u.id} onClick={()=>{setViewAs(u);setShowViewAs(false);setViewAsSearch("");}} style={{padding:"10px 14px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:viewAs?.id===u.id?"#EFF6FF":"transparent",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <span style={{fontSize:12,fontWeight:600,color:"#0F172A"}}>{u.name}</span>
                      <span style={{fontSize:10,color:"#94A3B8",marginLeft:6}}>{u.usertype}</span>
                    </div>
                    <Av name={u.name} id={u.id} size={24}/>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Content */}
      <div className="sg-content" style={{padding:"14px 14px 120px"}}>
        {tab==="home" && (
          <Dashboard currentUser={effectiveUser} tickets={myTickets} todos={myTodos} reminders={reminders} users={users}
            loaded={dashLoaded}
            onNav={setTab}
            onCreateTicket={()=>{ setTab("tickets"); setDashAction("createTicket"); }}
            onAddTodo={()=>{ setTab("todo"); setDashAction("addTodo"); }}/>
        )}
        {tab==="tickets" && (
          <TicketsModule users={users} currentUser={effectiveUser} isAdmin={isAdmin} addToast={addToast}
            viewAsUser={effectiveUser} onDataChange={loadAllData}
            externalOpen={dashAction==="createTicket"?"create":null}
            onExternalHandled={()=>setDashAction(null)}/>
        )}
        {tab==="todo" && (
          <TodoModule users={users} currentUser={effectiveUser} addToast={addToast}
            viewAsUser={effectiveUser} isAdmin={isAdmin} onDataChange={loadAllData}
            externalOpen={dashAction==="addTodo"?"add":null}
            onExternalHandled={()=>setDashAction(null)}/>
        )}
        {tab==="reminders" && <RemindersModule reminders={reminders} setReminders={setReminders} addToast={addToast}/>}
      </div>

      {/* Bottom nav */}
      <div className="sg-bottom-nav" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #F1F5F9",display:"flex",boxShadow:"0 -4px 20px rgba(0,0,0,.07)",zIndex:200,paddingBottom:20}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>{setTab(t.k); if(t.k==="home") loadAllData();}} style={{flex:1,padding:"11px 4px 9px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
            {t.badge>0 && <div style={{position:"absolute",top:5,left:"50%",marginLeft:5,width:17,height:17,background:"#EF4444",borderRadius:"50%",fontSize:9,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>{t.badge}</div>}
            <Ic n={t.i} s={20} c={tab===t.k?"#0F172A":"#94A3B8"}/>
            <span style={{fontSize:9,fontWeight:800,color:tab===t.k?"#0F172A":"#94A3B8",letterSpacing:.3}}>{t.l.toUpperCase()}</span>
            {tab===t.k && <div style={{position:"absolute",top:0,left:"28%",right:"28%",height:2.5,background:"#0F172A",borderRadius:"0 0 4px 4px"}}/>}
          </button>
        ))}
      </div>

      <Toasts list={toasts} dismiss={id=>setToasts(p=>p.filter(t=>t.id!==id))}/>
      {activeAlarm && <ReminderAlarm rem={activeAlarm} onDismiss={dismissAlarm} onSnooze={snoozeAlarm}/>}

      {/* Logout confirmation — 3 options */}
      {showLogoutConfirm && (
        <div style={{position:"fixed",inset:0,zIndex:5000,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:340,textAlign:"center"}}>
            <div style={{width:56,height:56,borderRadius:"50%",background:"#EFF6FF",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ic n="logout" s={26} c="#3B82F6"/>
            </div>
            <h3 style={{margin:"0 0 8px",fontSize:18,fontWeight:900,color:"#0F172A"}}>Account Options</h3>
            <p style={{margin:"0 0 20px",fontSize:12,color:"#64748B"}}>Choose an action below</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>setShowLogoutConfirm(false)} style={{width:"100%",padding:"13px",borderRadius:12,border:"1.5px solid #E2E8F0",background:"#fff",color:"#0F172A",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                ← Stay Logged In
              </button>
              <button onClick={doSwitchUser} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"#3B82F6",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                🔄 Switch User
              </button>
              <button onClick={doLogoutCompletely} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"#EF4444",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                🚫 Logout Completely
              </button>
              <p style={{margin:"8px 0 0",fontSize:10,color:"#94A3B8",lineHeight:1.4}}>
                "Switch User" keeps notifications active until new login.<br/>
                "Logout Completely" stops all notifications.
              </p>
            </div>
          </div>
        </div>
      )}

      {/* Thank you message */}
      {showThankYou && (
        <div style={{position:"fixed",inset:0,zIndex:6000,background:"linear-gradient(135deg,#0F172A,#1E3A5F)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",color:"#fff"}}>
            <div style={{fontSize:60,marginBottom:16}}>👋</div>
            <h2 style={{margin:"0 0 8px",fontSize:24,fontWeight:900}}>Thank You!</h2>
            <p style={{margin:0,fontSize:15,color:"#94A3B8"}}>{user?.name || "User"}, see you soon!</p>
          </div>
        </div>
      )}

      {/* Notification setup guide — shows once after first login */}
      {showNotifGuide && (
        <div style={{position:"fixed",inset:0,zIndex:5500,background:"rgba(0,0,0,.7)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔔</div>
            <h3 style={{margin:"0 0 8px",fontSize:18,fontWeight:900,color:"#0F172A"}}>Enable Full Notifications</h3>
            <p style={{margin:"0 0 16px",fontSize:13,color:"#64748B",lineHeight:1.5}}>
              To receive important task reminders even when your phone is locked, please enable these settings:
            </p>
            <div style={{textAlign:"left",background:"#F8FAFC",borderRadius:12,padding:"14px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:18}}>1️⃣</span>
                <div>
                  <div style={{fontSize:12,color:"#0F172A",fontWeight:700}}>Allow full-screen notifications</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>Shows alarm popup on lock screen</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:18}}>2️⃣</span>
                <div>
                  <div style={{fontSize:12,color:"#0F172A",fontWeight:700}}>Enable notification badges</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>Shows count on app icon</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>3️⃣</span>
                <div>
                  <div style={{fontSize:12,color:"#0F172A",fontWeight:700}}>Battery → Unrestricted</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>Prevents phone from killing the app</div>
                </div>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>{
                localStorage.setItem("sg_notif_guide_done","1");
                // Open notification settings via native bridge
                try { window.StatusGearNative.openNotificationSettings(); } catch(e){ console.log("Native bridge not available"); }
                setShowNotifGuide(false);
              }} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"#3B82F6",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                🔔 Open Notification Settings
              </button>
              <button onClick={()=>{
                localStorage.setItem("sg_notif_guide_done","1");
                try { window.StatusGearNative.openBatterySettings(); } catch(e){ console.log("Native bridge not available"); }
                setShowNotifGuide(false);
              }} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"#F59E0B",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                🔋 Open Battery Settings
              </button>
              <button onClick={()=>{setShowNotifGuide(false);localStorage.setItem("sg_notif_guide_done","1");}} style={{width:"100%",padding:"12px",borderRadius:12,border:"1.5px solid #E2E8F0",background:"#fff",color:"#64748B",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                I'll do it later
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Global error handler — shows error on screen if app crashes
window.onerror = function(msg, src, line, col, err) {
  const el = document.getElementById("root");
  if(el) el.innerHTML = '<div style="padding:20px;margin:10px;background:#FEE2E2;border-radius:10px"><h3 style="color:#DC2626">App Error</h3><pre style="font-size:11px;color:#991B1B;white-space:pre-wrap;word-break:break-all">' + msg + '\nLine: ' + line + '\n' + (err?.stack||'') + '</pre></div>';
};

</script>
</body>
</html>
